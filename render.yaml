services:
  - type: worker
    name: glassbox-agent
    runtime: node
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: TICK_SECONDS
        value: "120"
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: IamHarrie-Labs/glass-box
      - key: GITHUB_BRANCH
        value: master
      - key: PUSH_INTERVAL_MINUTES
        value: "60"
